<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Crea tu tarjeta | Fidelización La Sucursal del Café</title>
  <link rel="icon" type="image/png" href="assets/logo-la-sucursal-del-cafe.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css?v=20260621a">
  <link rel="stylesheet" href="css/fidelizacion.css?v=20260623a">
</head>
<body class="page-festival">
  <div class="site-shell">
    <header class="site-hero site-hero--coffee">
      <div class="festival-sub-hero">
        <p class="festival-kicker">Fidelización</p>
        <h1 class="festival-sub-hero__title">Crea tu tarjeta</h1>
        <p class="festival-sub-hero__lead">Toma 30 segundos. Después de registrarte verás tu tarjeta digital con tu código QR.</p>
      </div>
    </header>

    <main class="site-main site-main--festival">
      <section class="fid-section">
        <form id="formRegistro" class="fid-form">
          <div>
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" required autocomplete="name">
          </div>
          <div>
            <label for="telefono">Teléfono (WhatsApp)</label>
            <input type="tel" id="telefono" required autocomplete="tel" placeholder="3001234567">
          </div>
          <div>
            <label for="email">Correo (opcional)</label>
            <input type="email" id="email" autocomplete="email">
          </div>
          <p id="formError" class="form-error" hidden></p>
          <button type="submit" class="btn-submit" id="btnRegistrar">Crear mi tarjeta</button>
        </form>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-fidelizacion-config.js"></script>
  <script src="js/fidelizacion-common.js"></script>
  <script>
    document.getElementById('formRegistro').addEventListener('submit', function (e) {
      e.preventDefault();
      var errorEl = document.getElementById('formError');
      var btn = document.getElementById('btnRegistrar');
      errorEl.hidden = true;

      var datos = {
        nombre: document.getElementById('nombre').value.trim(),
        telefono: document.getElementById('telefono').value.trim(),
        email: document.getElementById('email').value.trim()
      };

      if (!datos.nombre || !datos.telefono) {
        errorEl.textContent = 'Nombre y teléfono son obligatorios.';
        errorEl.hidden = false;
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creando...';

      Fidelizacion.crearCliente(datos).then(function (docRef) {
        window.location.href = 'mi-tarjeta.html?id=' + encodeURIComponent(docRef.id);
      }).catch(function (err) {
        console.error(err);
        errorEl.textContent = 'No pudimos crear tu tarjeta. ' + (err && err.message ? err.message : 'Intenta de nuevo.');
        errorEl.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Crear mi tarjeta';
      });
    });
  </script>
</body>
</html>
