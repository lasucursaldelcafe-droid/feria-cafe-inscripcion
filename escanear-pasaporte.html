<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <title>Escanear Pasaporte — Stand | La Sucursal del Café</title>
  <link rel="icon" type="image/png" href="assets/logo-la-sucursal-del-cafe.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/pasaporte.css?v=20260625a">
</head>
<body class="escaner-page">
  <div class="escaner-shell">
    <header class="escaner-header">
      <img src="assets/logo-la-sucursal-del-cafe.png" alt="La Sucursal del Café" width="120" height="48">
      <h1>Escanear Pasaporte Cafetero</h1>
      <p>Panel de stand — suma puntos a los visitantes</p>
    </header>

    <section id="loginSection" class="escaner-card">
      <h2 style="margin:0 0 12px;font-size:1.1rem;color:#4B352A">Ingreso operador</h2>
      <p style="font-size:0.85rem;color:#666;margin:0 0 16px">Usuario y PIN que te dio el organizador de la feria.</p>
      <form id="loginForm">
        <div class="escaner-field">
          <label for="loginUsuario">Usuario</label>
          <input type="text" id="loginUsuario" autocomplete="username" required placeholder="ej. stand-cafe-01" autocapitalize="none">
        </div>
        <div class="escaner-field">
          <label for="loginPin">PIN</label>
          <input type="password" id="loginPin" autocomplete="current-password" required minlength="4" placeholder="••••" inputmode="numeric">
        </div>
        <p id="loginError" class="escaner-error" hidden></p>
        <button type="submit" class="escaner-btn" id="loginBtn">Entrar al escáner</button>
      </form>
    </section>

    <section id="scannerSection" hidden>
      <div class="escaner-card">
        <div class="escaner-toolbar">
          <span>Stand: <strong id="standNombre"></strong></span>
          <button type="button" id="logoutBtn" class="escaner-btn escaner-btn--secondary" style="width:auto;padding:6px 12px;font-size:0.8rem;margin:0">Salir</button>
        </div>
        <p style="font-size:0.85rem;color:#555;margin:0 0 12px">
          Puntos por escaneo: <strong id="puntosPorScan"></strong>
        </p>
        <div id="successMsg" class="escaner-success" hidden></div>
        <div id="scanError" class="escaner-error" hidden></div>
        <div id="qrReader"></div>

        <div class="escaner-manual">
          <p style="font-size:0.85rem;color:#666;margin:0 0 8px">¿La cámara falla? Pega el código o escanea manualmente:</p>
          <input type="text" id="manualCode" class="escaner-field" placeholder="LSCPAS:… o ID del visitante" style="width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;box-sizing:border-box">
          <button type="button" id="manualBtn" class="escaner-btn">Registrar puntos</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-fidelizacion-config.js"></script>
  <script src="js/sheets-config.js"></script>
  <script src="js/fidelizacion-sheets.js"></script>
  <script src="js/fidelizacion-db-shim.js"></script>
  <script src="js/fidelizacion-common.js"></script>
  <script src="js/escanear-pasaporte.js"></script>
</body>
</html>
