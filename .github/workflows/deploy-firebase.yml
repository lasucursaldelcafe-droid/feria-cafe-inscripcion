name: Deploy Firebase Hosting

on:
  workflow_dispatch:

env:
  FIREBASE_PROJECT: la-sucursal-del-cafe
  GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar rutas Firebase/site-links/sitemap
        run: |
          python3 tools/sync_routes.py
          python3 tools/sync_routes.py --check

      - name: Validar secretos de CI
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SHEETS_WEB_APP_URL: ${{ secrets.SHEETS_WEB_APP_URL }}
        run: python3 tools/validate_ci_secrets.py --ci

      - name: Generar js/sheets-config.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_WEB_APP_URL }}
        run: |
          CANONICAL=""
          if [ -f tools/CANONICAL_SHEETS_URL.txt ]; then
            CANONICAL="$(tr -d '\r\n' < tools/CANONICAL_SHEETS_URL.txt)"
          fi
          # Prioridad: URL canónica del repo (sincronizada con Code.gs) > secreto GitHub
          FINAL_URL="${CANONICAL:-$SHEETS_URL}"
          echo "sheets-config.js → ${FINAL_URL:-(vacío)}"
          if [ -n "$FINAL_URL" ]; then
            printf "window.SHEETS_CONFIG = {\n  WEB_APP_URL: '%s'\n};\n" "$FINAL_URL" > js/sheets-config.js
          else
            printf "window.SHEETS_CONFIG = {\n  WEB_APP_URL: ''\n};\n" > js/sheets-config.js
          fi

      - name: Deploy Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Sin FIREBASE_SERVICE_ACCOUNT — se usará deploy de hosting alternativo."
            exit 0
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          set +e
          OUTPUT=$(npx -y firebase-tools@latest deploy \
            --only hosting \
            --project la-sucursal-del-cafe \
            --non-interactive 2>&1)
          CODE=$?
          echo "$OUTPUT"
          rm -f /tmp/firebase-sa.json
          if [ "$CODE" -eq 0 ]; then exit 0; fi
          if echo "$OUTPUT" | grep -q "current active version"; then
            echo "Hosting ya en la versión activa — OK"
            exit 0
          fi
          exit "$CODE"

      - name: Deploy reglas Firestore (opcional)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then exit 0; fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx -y firebase-tools@latest deploy --only firestore:rules \
            --project la-sucursal-del-cafe --non-interactive || \
            echo "::warning::Firestore rules omitidas (permisos serviceusage)."
          rm -f /tmp/firebase-sa.json
        continue-on-error: true

      - name: Deploy Hosting (fallback)
        if: failure()
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: la-sucursal-del-cafe
          channelId: live

      - name: Verificar rutas en producción
        run: |
          BASE="https://la-sucursal-del-cafe.web.app"
          FAIL=0
          for path in / /pasaporte /escanear-pasaporte /jurado-v60 /registro-fidelizacion /panel-fidelizacion /qr /fidelizacion /inscripcion; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$path")
            echo "$CODE $path"
            if [ "$CODE" != "200" ]; then FAIL=1; fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "::warning::Alguna ruta no respondió 200 (revisar deploy)."
          fi
        continue-on-error: true

