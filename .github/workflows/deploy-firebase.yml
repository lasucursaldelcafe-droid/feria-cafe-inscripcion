name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar secretos de CI
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SHEETS_WEB_APP_URL: ${{ secrets.SHEETS_WEB_APP_URL }}
        run: python3 tools/validate_ci_secrets.py --ci

      - name: Generar js/sheets-config.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_WEB_APP_URL }}
        run: |
          if [ -n "$SHEETS_URL" ]; then
            printf "window.SHEETS_CONFIG = {\n  WEB_APP_URL: '%s'\n};\n" "$SHEETS_URL" > js/sheets-config.js
          else
            printf "window.SHEETS_CONFIG = {\n  WEB_APP_URL: ''\n};\n" > js/sheets-config.js
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: la-sucursal-del-cafe
          channelId: live
