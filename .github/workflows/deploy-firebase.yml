name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FIREBASE_PROJECT: la-sucursal-del-cafe
  GOOGLE_WALLET_ISSUER_ID: "3388000000023162431"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar secretos de CI
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SHEETS_WEB_APP_URL: ${{ secrets.SHEETS_WEB_APP_URL }}
        run: python3 tools/validate_ci_secrets.py --ci
        continue-on-error: true

      - name: Generar js/sheets-config.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_WEB_APP_URL }}
        run: |
          if [ -n "$SHEETS_URL" ]; then
            printf "window.SHEETS_CONFIG = {\n  WEB_APP_URL: '%s'\n};\n" "$SHEETS_URL" > js/sheets-config.js
          else
            printf "window.SHEETS_CONFIG = {\n  WEB_APP_URL: ''\n};\n" > js/sheets-config.js
          fi

      - name: Deploy completo (Hosting + Wallet + Firestore)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_WALLET_ISSUER_ID: ${{ env.GOOGLE_WALLET_ISSUER_ID }}
        run: |
          set -e
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Sin FIREBASE_SERVICE_ACCOUNT — se usará deploy de hosting alternativo."
            exit 0
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          cd functions && npm install && cd ..
          python3 tools/configure_wallet_firebase.py --enable-apis
          npx -y firebase-tools@latest deploy \
            --only hosting,functions:generateWalletPass \
            --project la-sucursal-del-cafe \
            --non-interactive
          rm -f /tmp/firebase-sa.json

      - name: Deploy reglas Firestore (opcional)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then exit 0; fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          npx -y firebase-tools@latest deploy --only firestore:rules \
            --project la-sucursal-del-cafe --non-interactive || true
          rm -f /tmp/firebase-sa.json
        continue-on-error: true

      - name: Deploy Hosting (fallback sin cuenta de servicio)
        if: failure()
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: la-sucursal-del-cafe
          channelId: live
        continue-on-error: true

      - name: Verificar generateWalletPass
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Saltando verificación Wallet (sin SA)."
            exit 0
          fi
          URL="https://us-central1-la-sucursal-del-cafe.cloudfunctions.net/generateWalletPass"
          CODE=$(curl -sS -o /tmp/wallet-test.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d '{"clienteId":"ci-test","nombre":"Test","puntos":0,"nivel":"Bronce"}' || echo "000")
          echo "generateWalletPass → HTTP $CODE"
          head -c 400 /tmp/wallet-test.json 2>/dev/null || true
          echo ""
          if [ "$CODE" = "404" ]; then
            echo "::warning::Function aún no publicada (404)"
          fi
