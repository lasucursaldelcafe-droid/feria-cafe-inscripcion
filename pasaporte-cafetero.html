<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#5D3A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pasaporte Cafetero">
  <title>Pasaporte Cafetero | La Sucursal del Café</title>
  <link rel="icon" type="image/png" href="assets/logo-la-sucursal-del-cafe.png">
  <link rel="apple-touch-icon" href="assets/logo-la-sucursal-del-cafe.png">
  <link rel="manifest" href="manifest-pasaporte.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css?v=20260625a">
  <link rel="stylesheet" href="css/fidelizacion.css?v=20260625a">
  <link rel="stylesheet" href="css/pasaporte.css?v=20260625a">
</head>
<body class="pasaporte-page">
  <div class="pasaporte-shell">
    <div id="installBanner"></div>

    <div id="loading" class="pasaporte-loading">Cargando tu Pasaporte Cafetero…</div>

    <div id="errorBox" class="pasaporte-error" hidden>
      <p id="errorMsg"></p>
      <p style="margin-top:16px"><a data-link="fidelizacionRegistro" href="fidelizacion-registro.html" style="color:#E9E6DD">Crear mi pasaporte</a></p>
    </div>

    <article id="pasaporte" class="pasaporte-card" hidden>
      <div class="pasaporte-card__top">
        <div class="pasaporte-card__brand">
          <img src="assets/logo-la-sucursal-del-cafe.png" alt="La Sucursal del Café" width="100" height="40">
        </div>
        <span class="pasaporte-card__badge" id="nivelBadge">Bronce</span>
      </div>

      <h1 class="pasaporte-card__title">Pasaporte Cafetero</h1>
      <p class="pasaporte-card__subtitle">La Sucursal del Café · Feria 2026</p>

      <p class="pasaporte-card__saludo">Hola, <strong id="nombreCliente">visitante</strong></p>
      <p class="pasaporte-card__puntos" id="puntosActuales">0</p>
      <p class="pasaporte-card__puntos-label">puntos disponibles</p>

      <div class="pasaporte-card__progreso">
        <div class="pasaporte-card__progreso-fill" id="progresoFill" style="width:0%"></div>
      </div>
      <p class="pasaporte-card__progreso-text" id="progresoTexto"></p>

      <div class="pasaporte-qr-box">
        <div id="qrContainer" aria-label="Código QR del pasaporte"></div>
        <p class="pasaporte-qr-hint">Muestra este QR en cada stand. El expositor lo escanea y sumas puntos al instante.</p>
        <button type="button" id="btnWallet" class="pasaporte-btn pasaporte-btn--wallet" hidden>+ Google Wallet (opcional)</button>
      </div>

      <div class="pasaporte-actions">
        <button type="button" id="btnDescargar" class="pasaporte-btn pasaporte-btn--primary">Descargar QR</button>
        <button type="button" id="btnWhatsApp" class="pasaporte-btn pasaporte-btn--wa">WhatsApp</button>
        <button type="button" id="btnCopiar" class="pasaporte-btn pasaporte-btn--muted">Copiar enlace</button>
      </div>

      <section class="pasaporte-historial" id="historialSection" hidden>
        <h3>Últimos movimientos</h3>
        <ul id="historialLista"></ul>
      </section>
    </article>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-fidelizacion-config.js"></script>
  <script src="js/site-links.js"></script>
  <script src="js/fidelizacion-common.js"></script>
  <script src="js/qr-render.js"></script>
  <script src="js/pasaporte-pwa.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var clienteId = params.get('id');
      var loading = document.getElementById('loading');
      var errorBox = document.getElementById('errorBox');
      var pasaporte = document.getElementById('pasaporte');

      PasaportePWA.mostrarBannerInstalar('installBanner');

      function mostrarError(msg) {
        loading.hidden = true;
        document.getElementById('errorMsg').textContent = msg;
        errorBox.hidden = false;
      }

      if (!clienteId) {
        mostrarError('Abre el enlace personal que recibiste al registrarte, o crea tu pasaporte ahora.');
        return;
      }

      function renderHistorial(clienteId) {
        Fidelizacion.listarTransaccionesCliente(clienteId, 8).then(function (snap) {
          if (snap.empty) return;
          var ul = document.getElementById('historialLista');
          ul.innerHTML = '';
          snap.forEach(function (doc) {
            var t = doc.data();
            var li = document.createElement('li');
            var pts = t.puntos || 0;
            var cls = pts >= 0 ? 'pts-pos' : 'pts-neg';
            var signo = pts >= 0 ? '+' : '';
            li.innerHTML = '<span>' + (t.descripcion || t.sede || 'Movimiento') + '<br><small>' + Fidelizacion.formatoHora(t.fecha) + '</small></span>' +
              '<span class="' + cls + '">' + signo + pts + '</span>';
            ul.appendChild(li);
          });
          document.getElementById('historialSection').hidden = false;
        }).catch(function () { /* índice puede faltar al inicio */ });
      }

      function pintarTarjeta(data) {
        var nivelActual = Fidelizacion.calcularNivel(data.puntosHistoricos || 0);
        var siguiente = Fidelizacion.siguienteNivel(data.puntosHistoricos || 0);

        document.getElementById('nombreCliente').textContent = (data.nombre || 'Visitante').split(' ')[0];
        document.getElementById('puntosActuales').textContent = data.puntos || 0;
        document.getElementById('nivelBadge').textContent = nivelActual.nombre;
        document.getElementById('nivelBadge').style.background = nivelActual.color;

        if (siguiente) {
          var rango = siguiente.minimo - nivelActual.minimo;
          var avance = (data.puntosHistoricos || 0) - nivelActual.minimo;
          var pct = Math.max(0, Math.min(100, Math.round((avance / rango) * 100)));
          document.getElementById('progresoFill').style.width = pct + '%';
          document.getElementById('progresoTexto').textContent =
            (siguiente.minimo - (data.puntosHistoricos || 0)) + ' pts para ' + siguiente.nombre;
        } else {
          document.getElementById('progresoFill').style.width = '100%';
          document.getElementById('progresoTexto').textContent = '¡Nivel máximo alcanzado!';
        }

        return nivelActual;
      }

      function initQr() {
        var payload = Fidelizacion.qrPayload(clienteId);
        return QRRender.toCanvas(document.getElementById('qrContainer'), payload, {
          width: 200,
          ariaLabel: 'QR Pasaporte Cafetero'
        });
      }

      Fidelizacion.obtenerCliente(clienteId).then(function (snap) {
        if (!snap.exists) {
          mostrarError('No encontramos este pasaporte. Verifica el enlace o regístrate de nuevo.');
          return;
        }
        var data = snap.data();
        var nivelActual = pintarTarjeta(data);

        return initQr().then(function () {
          loading.hidden = true;
          pasaporte.hidden = false;

          document.getElementById('btnDescargar').addEventListener('click', function () {
            QRRender.descargarDesdeContenedor(
              document.getElementById('qrContainer'),
              'pasaporte-' + (data.nombre || 'cafetero').replace(/\s+/g, '-').toLowerCase() + '.png'
            );
          });

          document.getElementById('btnWhatsApp').addEventListener('click', function () {
            var url = Fidelizacion.urlPasaporte(clienteId);
            var msg = 'Mi Pasaporte Cafetero de La Sucursal del Café ☕\n' + url;
            window.open('https://api.whatsapp.com/send?text=' + encodeURIComponent(msg), '_blank');
          });

          document.getElementById('btnCopiar').addEventListener('click', function () {
            navigator.clipboard.writeText(Fidelizacion.urlPasaporte(clienteId)).then(function () {
              alert('Enlace copiado. Guárdalo en favoritos o añádelo a tu pantalla de inicio.');
            });
          });

          renderHistorial(clienteId);

          Fidelizacion.escucharCliente(clienteId, function (doc) {
            if (doc.exists) pintarTarjeta(doc.data());
          });
        });
      }).catch(function (err) {
        console.error(err);
        mostrarError('Error al cargar el pasaporte. Intenta de nuevo.');
      });
    })();
  </script>
</body>
</html>
